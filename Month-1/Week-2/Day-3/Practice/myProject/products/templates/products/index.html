<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
  <h1>{{heading}}</h1>

  {{products}}

  {% for product in products %}

  <h1>{{product.id}}</h1>
  <h4>{{product.name}}</h4>
  <img height="100" src="{{product.img}}" alt="">

  <button><a href="{% url 'details' product.id %}">View More</a></button>

  {% endfor %}

</body>
</html>
